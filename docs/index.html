<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>玫瑰商学院数字粒子</title>
  <meta http-equiv="refresh" content="0; url=./玫瑰商学院数字粒子/" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #030714;
      --panel: rgba(7, 16, 33, 0.66);
      --line: rgba(143, 200, 255, 0.18);
      --text: #eaf6ff;
      --muted: rgba(190, 220, 255, 0.72);
      --accent: #9ed8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 18% 22%, rgba(71, 143, 255, 0.24), transparent 26%),
        radial-gradient(circle at 78% 18%, rgba(90, 232, 214, 0.16), transparent 24%),
        radial-gradient(circle at 50% 78%, rgba(32, 78, 168, 0.22), transparent 36%),
        linear-gradient(180deg, #030714 0%, #040b18 36%, #02050c 100%);
      color: var(--text);
    }
    .card {
      width: min(92vw, 760px);
      padding: 32px 24px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
      text-align: center;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(30px, 5vw, 52px);
      letter-spacing: 0.08em;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }
    a {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 20px;
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      border: 1px solid rgba(160, 210, 255, 0.28);
      background: rgba(8, 18, 36, 0.4);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.22);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>玫瑰商学院数字粒子</h1>
    <p>正在进入专属发布页。如果页面没有自动跳转，请点击下方按钮。</p>
    <a href="./玫瑰商学院数字粒子/">进入数字粒子</a>
  </main>
</body>
</html>
