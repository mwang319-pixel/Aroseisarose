        body {

                radial-gradient(circle at 78% 18%, rgba(90, 232, 214, 0.16), transparent 24%),
                radial-gradient(circle at 50% 78%, rgba(32, 78, 168, 0.22), transparent 36%),

            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;

        /* 大屏UI层 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 8vh; }
        #top-controls {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        .control-btn {
            appearance: none;
            border: 1px solid rgba(160, 210, 255, 0.28);
            background: rgba(8, 18, 36, 0.4);
            color: #e5f4ff;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 14px;
            letter-spacing: 0.08em;
            cursor: pointer;
            backdrop-filter: blur(14px);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.22);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }
        .control-btn:hover {
            transform: translateY(-1px);
            background: rgba(18, 36, 72, 0.56);
            border-color: rgba(187, 226, 255, 0.52);
        }

            font-size: 3vw;

            letter-spacing: 0.26vw;
            text-shadow: 0 0 28px rgba(126, 202, 255, 0.28), 0 0 40px rgba(255, 106, 177, 0.2);

            transform: translate3d(0, 80px, 0);

            text-align: center;
            max-width: 70vw;

        #status-text.show { opacity: 1; transform: translate3d(0, 0, 0); }
        #status-text.launch-text {
            position: absolute;
            bottom: 1.2vh;
            left: 50%;
            transform: translate3d(-50%, 120px, 0);

            background: transparent;
            backdrop-filter: none;
            box-shadow: none;

        #status-text.launch-text.show { transform: translate3d(-50%, 0, 0); }
        #main-text {
            display: inline-block;
            padding: 0.25em 0.95em;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(6, 15, 35, 0.16), rgba(6, 15, 35, 0.04));
            backdrop-filter: blur(10px);
            transition: background 0.8s ease, box-shadow 0.8s ease, padding 0.8s ease, letter-spacing 0.8s ease, font-size 0.8s ease;
        }
        #status-text.launch-text #main-text {
            display: block;
            padding: 0;
            border-radius: 0;
            background: none;
            backdrop-filter: none;
            font-size: clamp(20px, 2.05vw, 34px);
            letter-spacing: 0.14em;
            text-shadow: 0 0 16px rgba(255, 214, 236, 0.24), 0 0 30px rgba(106, 193, 255, 0.18);
            box-shadow: none;
        }
        .subtitle { font-size: 1.05vw; margin-top: 1.2vh; font-weight: 500; opacity: 0.72; letter-spacing: 0.22vw; color: rgba(210, 234, 255, 0.72); transition: opacity 0.8s ease, letter-spacing 0.8s ease, color 0.8s ease, transform 0.8s ease; }
        #status-text.launch-text .subtitle {
            margin-top: 1vh;
            font-size: clamp(10px, 0.78vw, 13px);
            letter-spacing: 0.26em;
            color: rgba(218, 233, 255, 0.58);
            transform: translateY(0);
        }
        
        /* 右下角二维码区域 */
        #qr-container { position: absolute; bottom: 40px; right: 40px; background: rgba(8, 18, 36, 0.42); border: 1px solid rgba(125, 186, 255, 0.28); box-shadow: 0 22px 48px rgba(0, 0, 0, 0.28); padding: 20px; border-radius: 18px; text-align: center; backdrop-filter: blur(14px); }
        #qr-container img { width: 150px; height: 150px; background: #fff; display: block; margin-bottom: 10px; }
        #qr-container p { font-size: 16px; color: #9ed8ff; font-weight: 600; }

        /* 启动前全屏蒙版 */
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 35%, rgba(13, 34, 76, 0.72), rgba(0, 0, 0, 0.9)); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; }

        .aurora-band.one {
            width: 42vw;
            height: 22vw;
            left: -6vw;
            top: 8vh;

        .aurora-band.two {

            height: 20vw;
            right: -3vw;
            top: 16vh;
            background: radial-gradient(circle, rgba(92, 241, 226, 0.28) 0%, rgba(35, 85, 193, 0.08) 60%, transparent 74%);

            height: 28vw;
            left: 22vw;

        }

            from { transform: translate3d(0, 0, 0) scale(1); }
            to { transform: translate3d(3vw, -2vh, 0) scale(1.12); }
        }

        #webcam { display: none; }

        body.mobile-body #ui-layer { display: none !important; }
        body.mobile-body #qr-container { display: none !important; }
        body.mobile-body #start-overlay { display: none !important; }

        /* ========= 手机端专属样式 ========= */
        .mobile-body { background: linear-gradient(135deg, #030714, #09142a 58%, #03060d); display: flex; flex-direction: column; justify-content: space-between; align-items: center; height: 100vh; width: 100vw; pointer-events: auto; padding: 60px 20px 40px; font-size: 16px; }

        .mobile-header h2 { color: #fff; margin-bottom: 12px; font-weight: 300; font-size: 32px; letter-spacing: 2px; }
        .mobile-status { color: #ff99cc; font-size: 14px; line-height: 1.5; font-weight: 500; }
        .mobile-content { display: flex; flex-direction: column; justify-content: center; align-items: center; flex-grow: 1; width: 100%; max-width: 400px; }
        .send-btn { background: linear-gradient(135deg, #ff6699, #ff3366); color: white; border: none; width: 180px; height: 180px; border-radius: 50%; font-size: 24px; font-weight: bold; box-shadow: 0 0 40px rgba(255, 102, 153, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.1); margin: 20px 0 40px; transition: all 0.15s ease; cursor: pointer; }

<body>

    <script>
        // ==========================================
        // 核心路由：判断当前是【手机端】还是【大屏端】
        // ==========================================
        if (window.location.hash === '#mobile') {
            // 手机端极简UI渲染
            document.body.className = 'mobile-body';
            const bcSupported = 'BroadcastChannel' in window;

            document.body.innerHTML = `
                <div class="mobile-header">
                    <h2>玫瑰商学院</h2>
                    <p class="mobile-status">✓ 已连接</p>
                </div>
                <div class="mobile-content">
                    <button class="send-btn" id="send-btn">发送粒子</button>
                    <p id="mobile-hint" style="font-size: 16px; color: #aaa; text-align: center; margin-top: 20px;">点击按钮，将你的粒子汇入大屏</p>
                </div>
                <div class="mobile-footer">
                    <p id="mobile-footer-text">点击按钮发送你的粒子，让光影汇聚</p>
                </div>
            `;

            let bc = null;
            if (bcSupported) {
                try {
                    bc = new BroadcastChannel('rose_business_school');
                } catch (err) {
                    console.warn('BroadcastChannel 初始化失败', err);
                }
            }

            window.sendParticle = () => {
                // 尝试发送信号（如果能通信）
                if (bc) {
                    bc.postMessage('spawn_particles');
                }
                
                // 无论是否真正通信，都显示成功反馈
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                document.getElementById('mobile-hint').innerText = '✓ 已发送粒子！';
                document.getElementById('mobile-hint').style.color = '#ff99cc';
                
                setTimeout(() => {
                    document.getElementById('mobile-hint').innerText = '继续发送更多粒子...';
                    document.getElementById('mobile-hint').style.color = '#aaa';
                }, 2000);
            };

            document.getElementById('send-btn').addEventListener('click', window.sendParticle);

            // 终止后续大屏代码执行
            throw new Error('Mobile view rendered. Stopping main screen script.'); 
        }

        function getMobileShareURL() {
            const normalize = (value) => {
                if (!value) return '';
                const trimmed = String(value).trim();
                if (!trimmed) return '';
                return trimmed.split('#')[0].replace(/\/+$/, '');
            };

            const loc = window.location;
            const isManualSetup = loc.protocol === 'file:' || !loc.hostname;
            if (isManualSetup) {
                const savedUrl = normalize(localStorage.getItem('rose_mobile_share_base_url'));
                if (savedUrl) {
                    return `${savedUrl}#mobile`;
                }
            }

            if (loc.protocol === 'http:' || loc.protocol === 'https:') {
                return `${loc.origin}${loc.pathname}${loc.search}#mobile`;
            }

            return '';
        }

        function generateQRCode() {
            const qrImg = document.getElementById('qr-img');
            const link = getMobileShareURL();
            if (!qrImg) return;

            const txt = document.querySelector('#qr-container p');
            if (!link) {
                if (txt) txt.innerText = '请先保存手机可访问的扫码地址';
                qrImg.alt = '未配置可访问的扫码地址';
                return;
            }

            if (window.QRCode && QRCode.toDataURL) {
                QRCode.toDataURL(link, {
                    width: 150,
                    margin: 1,
                    color: {
                        dark: '#000000',
                        light: '#ffffff'
                    }
                }).then(url => {
                    qrImg.src = url;
                    qrImg.alt = `扫码进入手机端：${link}`;
                }).catch(err => {
                    console.error('二维码生成失败:', err);
                    if (txt) txt.innerText = `二维码生成失败，请手动访问：${link}`;
                });
            } else {
                console.warn('QRCode 库未加载');
                if (txt) txt.innerText = `二维码库未加载，请手动访问：${link}`;
            }
        }

        function syncShareConfigUI() {
            const shareConfig = document.getElementById('share-config');
            const shareInput = document.getElementById('share-url-input');
            const saveBtn = document.getElementById('save-share-url');
            const tip = document.getElementById('share-url-tip');
            if (!shareConfig || !shareInput || !saveBtn || !tip) return;

            const needsManualUrl = window.location.protocol === 'file:' || !window.location.hostname;
            shareConfig.style.display = needsManualUrl ? 'grid' : 'none';

            if (needsManualUrl) {
                const stored = localStorage.getItem('rose_mobile_share_base_url') || '';
                if (stored && !shareInput.value.trim()) {
                    shareInput.value = stored;
                }
                saveBtn.onclick = () => {
                    const value = shareInput.value.trim().split('#')[0].replace(/\/+$/, '');
                    if (!value) {
                        shareInput.focus();
                        tip.innerText = '请输入手机可以访问的 http(s) 地址。';
                        return;
                    }
                    localStorage.setItem('rose_mobile_share_base_url', value);
                    tip.innerText = '已保存，二维码会自动更新为手机可访问地址。';
                    generateQRCode();
                };
            }
        }

        window.addEventListener('DOMContentLoaded', syncShareConfigUI);
    </script>

            logoGatherProgress = 0;

            centerLight.color.set(0xffcf8f);

            haloMesh.material.color.set(0x5f93ff);

                mainTextEl.style.color = '#ffe6f3';
                textEl.classList.add('show');

        }

        function pushState(newState) {
            if (state === newState) return;
            stateStack.push(newState);
            applyStage(newState);
        }
        function popState() {
            if(stateStack.length > 1) {
                stateStack.pop();
                applyStage(stateStack[stateStack.length-1]);
            }
        }

        let activeParticles = 0; // 当前已经发射在屏幕上的粒子数
        const pData =[];        // 存储每个粒子的运动属性

        // 粒子聚合进度（0~1）
        let logoGatherProgress = 0;
        let centerLight;
        let haloMesh;
        let outerGlowMesh;

        // ==========================================
        // 1. 初始化 Three.js 场景
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020916, 0.00078);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.z = 800;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        function createHaloTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
            gradient.addColorStop(0.18, 'rgba(255, 255, 255, 0.62)');
            gradient.addColorStop(0.42, 'rgba(180, 215, 255, 0.24)');
            gradient.addColorStop(0.7, 'rgba(45, 96, 186, 0.06)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);
            return new THREE.CanvasTexture(canvas);
        }

        function createOuterGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.34)');
            gradient.addColorStop(0.2, 'rgba(255, 231, 245, 0.36)');
            gradient.addColorStop(0.42, 'rgba(150, 223, 255, 0.24)');
            gradient.addColorStop(0.62, 'rgba(95, 136, 255, 0.14)');
            gradient.addColorStop(0.82, 'rgba(42, 75, 180, 0.05)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

        }

        const ambientLight = new THREE.AmbientLight(0x7fa8ff, 0.36);
        scene.add(ambientLight);

        centerLight = new THREE.PointLight(0x8acbff, 0.8, 2200);
        centerLight.position.set(0, 0, 260);
        scene.add(centerLight);

        const haloGeometry = new THREE.PlaneGeometry(1200, 1200);
        const haloMaterial = new THREE.MeshBasicMaterial({
            color: 0x2a67ff,
            map: createHaloTexture(),
            transparent: true,
            opacity: 0.11,
            blending: THREE.AdditiveBlending,

        });
        haloMesh = new THREE.Mesh(haloGeometry, haloMaterial);
        haloMesh.position.set(0, 40, -600);

        const outerGlowGeometry = new THREE.PlaneGeometry(1800, 1800);
        const outerGlowMaterial = new THREE.MeshBasicMaterial({

        outerGlowMesh = new THREE.Mesh(outerGlowGeometry, outerGlowMaterial);
        outerGlowMesh.position.set(0, 30, -760);
        scene.add(outerGlowMesh);

        // ==========================================
        // 2. 生成发光粒子纹理 (纯代码生成，无依赖)
        // ==========================================
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.12, 'rgba(255, 250, 252, 1)');
            gradient.addColorStop(0.34, 'rgba(255, 230, 242, 0.94)');
            gradient.addColorStop(0.56, 'rgba(206, 230, 255, 0.74)');
            gradient.addColorStop(0.8, 'rgba(120, 193, 255, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        // ==========================================
        // 3. AI提取Logo像素点转三维坐标 (核心技术)
        // ==========================================
        let finalPositions =[];
        let finalColors =[];

        function blendHexColors(colorA, colorB, amount) {
            const a = new THREE.Color(colorA);
            const b = new THREE.Color(colorB);
            return a.lerp(b, amount);
        }

        function getLogoNebulaColor(sourcePoint, index, width, height) {
            const nx = (sourcePoint.x + width / 2) / width;
            const ny = (sourcePoint.y + height / 2) / height;
            const palette = CONFIG.logoNebulaPalette;
            const primary = palette[index % palette.length];
            const secondary = palette[(index + 2) % palette.length];
            const drift = 0.5 + 0.5 * Math.sin(nx * 8.4 + ny * 11.2 + index * 0.011);
            const color = blendHexColors(primary, secondary, drift * 0.72);
            const coreGlow = Math.max(0, 1 - Math.abs(nx - 0.5) * 1.55 - Math.abs(ny - 0.48) * 1.15);
            return color.lerp(new THREE.Color(0xffffff), coreGlow * 0.24);
        }

        function extractLogoPositions() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const w = 1000; const h = 500;
            canvas.width = w; canvas.height = h;

            const logoSources = [CONFIG.logoImagePath, CONFIG.logoImageBase64];

            const drawFallbackText = () => {
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 120px "Microsoft YaHei"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(CONFIG.logoText, w/2, h/2);
                processPixels(ctx, w, h);
            };

            const tryLoadSource = (index) => {
                if (index >= logoSources.length) {
                    drawFallbackText();
                    return;
                }

                const source = logoSources[index];
                if (!source) {
                    tryLoadSource(index + 1);
                    return;
                }

                const img = new Image();
                let settled = false;
                const fallbackTimer = setTimeout(() => {
                    if (settled) return;
                    settled = true;
                    tryLoadSource(index + 1);
                }, 2000);
                const processLoadedImage = () => {
                    try {
                        const sourceCanvas = document.createElement('canvas');
                        sourceCanvas.width = img.width;
                        sourceCanvas.height = img.height;
                        const sourceCtx = sourceCanvas.getContext('2d');
                        sourceCtx.drawImage(img, 0, 0);
                        const imageData = sourceCtx.getImageData(0, 0, img.width, img.height).data;
                        let minX = img.width;
                        let minY = img.height;
                        let maxX = -1;
                        let maxY = -1;
                        const rowHits = new Array(img.height).fill(0);
                        for (let y = 0; y < img.height; y++) {
                            for (let x = 0; x < img.width; x++) {
                                const idx = (y * img.width + x) * 4;
                                const a = imageData[idx + 3];
                                if (a < 24) continue;
                                const luma = 0.299 * imageData[idx] + 0.587 * imageData[idx + 1] + 0.114 * imageData[idx + 2];
                                if (luma < 250) {
                                    rowHits[y]++;
                                    if (x < minX) minX = x;
                                    if (y < minY) minY = y;
                                    if (x > maxX) maxX = x;
                                    if (y > maxY) maxY = y;
                                }
                            }
                        }
                        ctx.clearRect(0, 0, w, h);
                        if (maxX >= minX && maxY >= minY) {
                            const pad = Math.max(12, Math.round(Math.min(img.width, img.height) * 0.012));
                            let cropX = Math.max(0, minX - pad);
                            let cropY = Math.max(0, minY - pad);
                            let cropW = Math.min(img.width - cropX, maxX - minX + 1 + pad * 2);
                            let cropH = Math.min(img.height - cropY, maxY - minY + 1 + pad * 2);

                            const hitRows = [];
                            for (let y = minY; y <= maxY; y++) {
                                if (rowHits[y] > 10) hitRows.push(y);
                            }
                            if (hitRows.length > 0) {
                                const runs = [];
                                let runStart = hitRows[0];
                                let runPrev = hitRows[0];
                                for (let i = 1; i < hitRows.length; i++) {
                                    const row = hitRows[i];
                                    if (row !== runPrev + 1) {
                                        runs.push({ start: runStart, end: runPrev, len: runPrev - runStart + 1 });
                                        runStart = row;
                                    }
                                    runPrev = row;
                                }
                                runs.push({ start: runStart, end: runPrev, len: runPrev - runStart + 1 });
                                const topRun = runs.reduce((best, run) => (run.len > best.len ? run : best), runs[0]);
                                if (topRun && topRun.len > 40) {
                                    cropY = Math.max(0, topRun.start - pad);
                                    cropH = Math.min(img.height - cropY, topRun.len + pad * 2);
                                }
                            }
                            canvas.width = cropW;
                            canvas.height = cropH;
                            ctx.clearRect(0, 0, cropW, cropH);
                            ctx.drawImage(sourceCanvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
                            processPixels(ctx, cropW, cropH);
                            return;
                        } else {
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.clearRect(0, 0, img.width, img.height);
                            ctx.drawImage(sourceCanvas, 0, 0);
                            processPixels(ctx, img.width, img.height);
                            return;
                        }
                    } catch (err) {
                        console.warn('Logo 图源处理失败，切换到下一个源：', err);
                        tryLoadSource(index + 1);
                    }
                };
                img.onload = () => {
                    if (settled) return;
                    settled = true;
                    clearTimeout(fallbackTimer);
                    processLoadedImage();
                };
                img.onerror = () => {
                    if (settled) return;
                    settled = true;
                    clearTimeout(fallbackTimer);
                    tryLoadSource(index + 1);
                };
                img.src = source;
            };

            tryLoadSource(0);
        }

        function processPixels(ctx, w, h) {
            const imgData = ctx.getImageData(0, 0, w, h).data;
            const brightPoints = [];
            const darkPoints = [];
            for (let y = 0; y < h; y += 1) {
                for (let x = 0; x < w; x += 1) {
                    const idx = (y * w + x) * 4;
                    const r = imgData[idx];
                    const g = imgData[idx + 1];
                    const b = imgData[idx + 2];
                    const a = imgData[idx + 3];
                    if (a < 24) continue;
                    const luma = 0.299 * r + 0.587 * g + 0.114 * b;
                    if (luma > 205) { // 白底上的亮字 / 亮色 logo
                        brightPoints.push({
                            x: x - w / 2,
                            y: -(y - h / 2),
                            z: (Math.random() - 0.5) * 20 // 赋予一点厚度
                        });
                    } else if (luma < 140) { // 白底上的深色 logo
                        darkPoints.push({
                            x: x - w / 2,
                            y: -(y - h / 2),
                            z: (Math.random() - 0.5) * 20
                        });
                    }
                }
            }
            const tempPoints =
                (darkPoints.length > 0 && darkPoints.length < brightPoints.length)
                    ? darkPoints
                    : brightPoints.length > 0
                        ? brightPoints
                        : darkPoints;
            if (tempPoints.length === 0) {
                throw new Error('未从 logo 图中提取到任何像素点');
            }
            
            // 将提取的点按总量缩放适配
            finalPositions = new Float32Array(CONFIG.totalParticles * 3);
            finalColors = new Float32Array(CONFIG.totalParticles * 3);
            for (let i = 0; i < CONFIG.totalParticles; i++) {
                const sourcePoint = tempPoints[Math.floor(i * tempPoints.length / CONFIG.totalParticles)];
                const thickness = (Math.sin(i * 0.23) + Math.cos(i * 0.11)) * 8.5;
                const nebulaColor = getLogoNebulaColor(sourcePoint, i, w, h);
                const spreadX = Math.sin(i * 0.73) * 0.45;
                const spreadY = Math.cos(i * 0.51) * 0.45;
                const spreadZ = Math.sin(i * 0.37) * 0.35;
                finalPositions[i*3] = sourcePoint.x * CONFIG.logoScale + spreadX;
                finalPositions[i*3+1] = sourcePoint.y * CONFIG.logoScale + CONFIG.logoOffsetY + Math.sin(sourcePoint.x * 0.015) * 6 + spreadY;
                finalPositions[i*3+2] = sourcePoint.z + thickness + spreadZ;
                finalColors[i*3] = nebulaColor.r;
                finalColors[i*3+1] = nebulaColor.g;
                finalColors[i*3+2] = nebulaColor.b;
            }
            initParticles(); // 像素提取完成后初始化粒子系统
        }

        // ==========================================
        // 4. 构建粒子系统
        // ==========================================
        let geometry, particles;
        function initParticles() {
            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(CONFIG.totalParticles * 3);
            const colors = new Float32Array(CONFIG.totalParticles * 3);

            pData.length = 0;

            for (let i = 0; i < CONFIG.totalParticles; i++) {
                const radius = CONFIG.orbitRadiusMin + Math.random() * (CONFIG.orbitRadiusMax - CONFIG.orbitRadiusMin);
                const angle = Math.random() * Math.PI * 2;
                const swirl = Math.random() > 0.5 ? 1 : -1;
                const height = (Math.random() - 0.5) * 720;
                const depth = (Math.random() - 0.5) * 820;
                const startX = Math.cos(angle) * radius;
                const startY = Math.sin(angle) * radius * 0.48 + height;
                const startZ = depth;
                const colorHex = CONFIG.particlePalette[i % CONFIG.particlePalette.length];
                const color = new THREE.Color(colorHex);

                positions[i*3] = startX;
                positions[i*3+1] = startY;
                positions[i*3+2] = startZ;
                colors[i*3] = color.r;
                colors[i*3+1] = color.g;
                colors[i*3+2] = color.b;

                pData.push({
                    startX, startY, startZ,
                    angle,
                    radius,
                    baseHeight: height,
                    depth,
                    orbitSpeed: (0.003 + Math.random() * 0.008) * swirl,
                    radialSpeed: 1.1 + Math.random() * 2.3,
                    pulse: Math.random() * Math.PI * 2,
                    wobble: 18 + Math.random() * 44,
                    speed: 0.035 + Math.random() * 0.028,
                    swirlDirection: swirl,
                    logoSpin: (Math.random() * 2 - 1) * 1.7,
                    logoLift: (Math.random() - 0.5) * 140,
                    logoOrbitRadius: 180 + Math.random() * 320,
                    logoFlowOffset: Math.random() * Math.PI * 2,
                    logoFlowSpeed: 2.8 + Math.random() * 1.6,
                    logoFlowWidth: 0.9 + Math.random() * 0.55
                });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setDrawRange(0, Math.max(1, activeParticles));

            const material = new THREE.PointsMaterial({
                size: CONFIG.particleSize,
                map: createParticleTexture(),
                transparent: true,
                opacity: 0.98,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true,
                vertexColors: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
            
            animate(); // 开始渲染循环
        }

        // ==========================================
        // 5. 交互与通信 (BroadcastChannel 手机大屏联动)
        // ==========================================
        let bc = null;
        if ('BroadcastChannel' in window) {
            try {
                bc = new BroadcastChannel('rose_business_school');
                bc.onmessage = (event) => {
                    if (event.data === 'spawn_particles' && state === 0) {
                        // 每收到一次手机请求，激活100个粒子飞向中心
                        activeParticles = Math.min(activeParticles + 100, CONFIG.totalParticles);
                    }
                };
            } catch (err) {
                console.warn('BroadcastChannel 初始化失败，将只保留桌面端效果', err);
            }
        }

        // 键盘备用控制（应对网络不佳或无人扫码时的兜底方案）
        // Space: 模拟发送粒子
        // Enter: 在等待阶段直接启动
        // ArrowRight / PageDown: 前进到下一阶段
        // ArrowLeft / PageUp / Backspace: 回退到上一阶段
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && state === 0) {
                // 空格键模拟员工扫码发送
                activeParticles = Math.min(activeParticles + 300, CONFIG.totalParticles);
            }
            if (e.code === 'Enter' && state === 1) {
                // 回车键可强行跳过手势直接启动
                launchCeremony();
            }
            if (e.code === 'ArrowRight' || e.code === 'PageDown') {
                if (state === 0) {
                    transitionToWait();
                } else if (state === 1) {
                    launchCeremony();
                }
            }
            if (e.code === 'ArrowLeft' || e.code === 'PageUp' || e.code === 'Backspace') {
                popState();
            }
        });

        // ==========================================
        // 6. MAXHUB摄像头手势动作检测 (挥手识别)
        // ==========================================
        const video = document.getElementById('webcam');
        const motionCanvas = document.getElementById('motion-canvas');
        const motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        motionCanvas.width = 64; motionCanvas.height = 48; // 低分辨率提升计算速度
        
        let lastFrameData = null;
        let webcamAvailable = false;  // 摄像头是否可用标志

        function setSubText(message, color) {
            const el = document.getElementById('sub-text');
            if (!el) return;
            el.innerText = message;
            if (color) el.style.color = color;

        function explainCameraUnavailable(reason) {
            const host = window.location.hostname || '';
            const protocol = window.location.protocol;
            const isLocalHost = host === 'localhost' || host === '127.0.0.1' || host === '::1';
            if (protocol === 'http:' && !isLocalHost) {
                setSubText('当前是局域网 http 地址，浏览器会禁用摄像头。请在大屏端改用 http://localhost:8000/数字粒子2-1.html 打开。', '#ffd6d6');
                return;
            }
            if (reason) {
                setSubText(reason, '#ffd6d6');
            }
        }

        function updateFullscreenButton() {
            if (!fullscreenBtn) return;
            fullscreenBtn.innerText = document.fullscreenElement ? '退出全屏' : '进入全屏';
        }

        async function toggleFullscreen() {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                } else if (document.exitFullscreen) {
                    await document.exitFullscreen();
                }
            } catch (err) {
                console.warn('全屏切换失败:', err);
            }
            updateFullscreenButton();
        }

        fullscreenBtn?.addEventListener('click', toggleFullscreen);
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        
        async function setupWebcam() {
            try {
                if (!window.isSecureContext && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' && window.location.hostname !== '::1') {
                    webcamAvailable = false;
                    explainCameraUnavailable('当前页面不是安全上下文，摄像头无法启动。请用 http://localhost:8000/数字粒子2-1.html 打开大屏端。');
                    console.warn('✗ 非安全上下文，摄像头被浏览器限制');
                    return;
                }

                // 尝试带有请求权限的宽松参数
                const constraints = {
                    video: { 
                        width: { ideal: 640 }, 
                        height: { ideal: 480 },
                        facingMode: 'user'
                    }, 
                    audio: false
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                webcamAvailable = true;
                console.log('✓ 摄像头已启动，支持手势识别');
                
            } catch (err) {
                webcamAvailable = false;
                const errorMsg = err.name || err.message;
                
                // 根据错误类型给出不同提示
                if (errorMsg === 'NotAllowedError' || errorMsg.includes('Permission denied')) {
                    console.warn('✗ 摄像头权限被拒绝：用户未授予权限，或访问地址为 192.168.x.x（某些浏览器安全限制）');
                    console.warn('📌 解决方案：1) 用 https:// 访问 2) 用 localhost 代替 192.168.x.x 3) 或按回车键(Enter)跳过手势启动');
                    explainCameraUnavailable('摄像头权限不可用。若当前是局域网 http 地址，请在大屏端用 http://localhost:8000/数字粒子2-1.html 打开。');
                } else if (errorMsg === 'NotFoundError') {
                    console.warn('✗ 未找到摄像头设备，将使用倒计时自动启动');
                    explainCameraUnavailable('未检测到摄像头设备，页面将改为自动启动。');
                } else if (errorMsg === 'NotReadableError') {
                    console.warn('✗ 摄像头被占用（可能被其他应用使用），将使用倒计时自动启动');
                    explainCameraUnavailable('摄像头当前被其他程序占用，页面将改为自动启动。');
                } else {
                    console.warn('✗ 摄像头启动失败：' + errorMsg);
                    explainCameraUnavailable(`摄像头启动失败：${errorMsg}`);
                }
            }
        }

        function checkMotion() {
            // 仅在摄像头可用且处于等待状态时检测
            if (state !== 1 || !webcamAvailable || !video.videoWidth) return;
            
            motionCtx.drawImage(video, 0, 0, 64, 48);
            const currentFrame = motionCtx.getImageData(0, 0, 64, 48);
            let diffScore = 0;

            if (lastFrameData) {
                for (let i = 0; i < currentFrame.data.length; i += 4) {
                    const rDiff = Math.abs(currentFrame.data[i] - lastFrameData.data[i]);
                    if (rDiff > 40) diffScore++; // 差异超过阈值算作运动像素
                }
            }
            lastFrameData = currentFrame;

            // 屏幕上出现大面积像素变动（挥手） => 触发最终启动
            if (diffScore > CONFIG.motionThreshold) {
                launchCeremony();
            }
        }

        // ==========================================
        // 7. 仪式流程控制逻辑
        // ==========================================
        
        // 【第一步】初始化系统 (需用户点击一次解除浏览器限制)
        function initSystem() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('status-text').classList.remove('show', 'launch-text');
            // 尝试全屏
            if(document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => {});
            }
            updateFullscreenButton();
            setupWebcam();
            extractLogoPositions(); // 开始提取像素

            // 启动定时器：严格要求1分钟后进入等待状态
            setTimeout(() => {
                if (state === 0) transitionToWait();
            }, CONFIG.gatherTime);
            
            // 自动模拟一些基础粒子（防止开场全空）
            activeParticles = CONFIG.initialParticles;
            setInterval(() => {
                if(state === 0 && activeParticles < CONFIG.totalParticles * CONFIG.autoSpawnCapRatio) {
                    activeParticles = Math.min(
                        activeParticles + CONFIG.autoSpawnBatch,
                        Math.floor(CONFIG.totalParticles * CONFIG.autoSpawnCapRatio)
                    );
                }
            }, CONFIG.autoSpawnInterval);
        }

        // 【第二步】1分钟后，显示等待文字
        function transitionToWait() {
            if (state >= 1) return;
            pushState(1);
            
            // 如果摄像头不可用，启动倒计时自动启动（30秒后）
            if (!webcamAvailable) {
                if (window.isSecureContext || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '::1') {
                    setSubText('摄像头暂不可用，30秒后自动启动...');
                }
                let countdown = 30;
                autoLaunchCountdownTimer = setInterval(() => {
                    countdown--;
                    if (countdown > 0) {
                        if (window.isSecureContext || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname === '::1') {
                            setSubText(`摄像头暂不可用，${countdown}秒后自动启动...`);
                        }
                    } else {
                        clearInterval(autoLaunchCountdownTimer);
                        autoLaunchCountdownTimer = null;
                        launchCeremony();
                    }
                }, 1000);
            }
        }

        // 【第三步】点亮第一束光，最终绽放
        function launchCeremony() {
            if (state === 2) return;
            pushState(2);
        }

        // ==========================================
        // 8. 核心渲染与粒子动画引擎
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const now = performance.now();

            if (particles) {
                geometry.setDrawRange(0, Math.max(1, activeParticles));
                const positions = geometry.attributes.position.array;
                const colors = geometry.attributes.color.array;
                const stage2Elapsed = state === 2 && stage2StartTime ? now - stage2StartTime : 0;
                const stage2SettleProgress = state === 2
                    ? Math.min(1, stage2Elapsed / CONFIG.stage2SettleDuration)
                    : 0;
                const stage2GlowProgress = state === 2
                    ? Math.max(0, Math.min(1, (stage2Elapsed - CONFIG.stage2GlowDelay) / CONFIG.stage2GlowRampDuration))
                    : 0;
                if (state === 2) logoGatherProgress = stage2SettleProgress;
                
                // 每帧检测动作
                if(state === 1 && Math.floor(time * 10) % 2 === 0) checkMotion(); 

                for (let i = 0; i < activeParticles; i++) {
                    const idx = i * 3;
                    const data = pData[i];

                    if (state === 0 || state === 1) {
                        const orbitBoost = state === 1 ? 1.45 : 1;
                        data.angle += data.orbitSpeed * CONFIG.particleSpeedMultiplier * orbitBoost;
                        data.radius -= data.radialSpeed * orbitBoost;
                        if (data.radius < CONFIG.orbitRadiusMin) {
                            data.radius = CONFIG.orbitRadiusMax + Math.random() * 180;
                            data.baseHeight = (Math.random() - 0.5) * 720;
                            data.depth = (Math.random() - 0.5) * 820;
                        }

                        const breathing = Math.sin(time * 1.7 + data.pulse) * data.wobble;
                        positions[idx] = Math.cos(data.angle) * (data.radius + breathing);
                        positions[idx+1] = Math.sin(data.angle) * (data.radius * 0.42) + data.baseHeight + Math.cos(time * 1.3 + data.pulse) * (data.wobble * 0.35);
                        positions[idx+2] = data.depth + Math.sin(time * 0.9 + data.pulse * 0.5) * 120;

                    } else if (state === 2) {
                        const targetX = finalPositions[idx];
                        const targetY = finalPositions[idx+1];
                        const targetZ = finalPositions[idx+2];
                        const baseR = finalColors[idx];
                        const baseG = finalColors[idx+1];
                        const baseB = finalColors[idx+2];
                        const settleLerp = 0.11 + logoGatherProgress * 0.18;

                        positions[idx] += (targetX - positions[idx]) * settleLerp;
                        positions[idx+1] += (targetY - positions[idx+1]) * settleLerp;
                        positions[idx+2] += (targetZ - positions[idx+2]) * (settleLerp * 0.9);

                        if (logoGatherProgress > 0.96) {
                            positions[idx] = targetX;
                            positions[idx+1] = targetY;
                            positions[idx+2] = targetZ;
                        }

                        const lineMetricBase = (
                            Math.atan2(targetY, targetX) / (Math.PI * 2) +
                            0.5 +
                            Math.hypot(targetX, targetY) * 0.00105 +
                            targetZ * 0.0024 +
                            data.logoFlowOffset * 0.06
                        );
                        const lineMetric = ((lineMetricBase % 1) + 1) % 1;
                        const beamHead = (time * 0.095) % 1;
                        const beamTail = (beamHead + 0.16) % 1;
                        const headDist = Math.min(Math.abs(lineMetric - beamHead), 1 - Math.abs(lineMetric - beamHead));
                        const tailDist = Math.min(Math.abs(lineMetric - beamTail), 1 - Math.abs(lineMetric - beamTail));
                        const headBeam = Math.exp(-(headDist * headDist) / 0.0018);
                        const tailBeam = Math.exp(-(tailDist * tailDist) / 0.0042) * 0.42;
                        const ambientBeam = Math.exp(-(headDist * headDist) / 0.012) * 0.08;
                        const flashCore = Math.pow(
                            Math.max(0, Math.sin(time * 8.2 + lineMetric * 28 + data.logoFlowOffset * 2.4)),
                            18
                        ) * (0.12 + headBeam * 0.88);
                        const glowMix = Math.min(1, (
                            (headBeam + tailBeam + ambientBeam) * 0.88 * data.logoFlowWidth + flashCore
                        ) * stage2GlowProgress);
                        const glowTintR = 1;
                        const glowTintG = 0.95;
                        const glowTintB = 0.99;
                        const targetR = baseR + (glowTintR - baseR) * glowMix;
                        const targetG = baseG + (glowTintG - baseG) * glowMix;
                        const targetB = baseB + (glowTintB - baseB) * glowMix;
                        const baseColorLerp = 0.18;
                        const glowColorLerp = 0.12 + headBeam * 0.08;

                        colors[idx] += ((baseR + (targetR - baseR) * stage2GlowProgress) - colors[idx]) * (stage2GlowProgress > 0 ? glowColorLerp : baseColorLerp);
                        colors[idx+1] += ((baseG + (targetG - baseG) * stage2GlowProgress) - colors[idx+1]) * (stage2GlowProgress > 0 ? glowColorLerp : baseColorLerp);
                        colors[idx+2] += ((baseB + (targetB - baseB) * stage2GlowProgress) - colors[idx+2]) * (stage2GlowProgress > 0 ? glowColorLerp : baseColorLerp);
                    }
                }
                geometry.attributes.position.needsUpdate = true;
                if (state === 2) geometry.attributes.color.needsUpdate = true;

                if (state === 2) {
                    particles.rotation.x = 0;
                    particles.rotation.y = 0;
                    particles.rotation.z = 0;
                    particles.material.size = CONFIG.particleSize + (CONFIG.launchParticleSize - CONFIG.particleSize) * stage2GlowProgress;
                    particles.material.opacity = 0.94 + stage2GlowProgress * 0.04;
                    haloMesh.material.opacity = 0.08 + stage2GlowProgress * 0.08 + Math.sin(time * 1.6) * 0.01 * stage2GlowProgress;
                    if (outerGlowMesh) {
                        outerGlowMesh.material.opacity = 0.14 + stage2GlowProgress * 0.28 + Math.sin(time * 1.2) * 0.02 * stage2GlowProgress;
                        outerGlowMesh.scale.setScalar(1 + stage2GlowProgress * 0.08);
                    }
                    centerLight.intensity = 1.15 + stage2GlowProgress * 0.4 + Math.sin(time * 1.6) * 0.06 * stage2GlowProgress;
                } else {
                    particles.material.size = CONFIG.particleSize;
                    particles.material.opacity = 0.98;
                    particles.rotation.z = Math.sin(time * 0.12) * 0.08;
                    particles.rotation.y = Math.sin(time * 0.18) * 0.05;
                    particles.rotation.x = Math.cos(time * 0.16) * 0.03;
                    haloMesh.material.opacity = 0.08 + Math.sin(time * 0.9) * 0.015;
                    if (outerGlowMesh) {
                        outerGlowMesh.material.opacity = 0;
                        outerGlowMesh.scale.setScalar(1);
                    }
                    centerLight.intensity = 0.8 + Math.sin(time * 1.4) * 0.08;
                }
            }

            renderer.render(scene, camera);
        }

        // 窗口自适应适应16:9或其他比例
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 页面载入后立即生成二维码（请确保 QRCode 库可用）
        window.addEventListener('DOMContentLoaded', generateQRCode);
        generateQRCode(); // 直接调用，以防事件已触发

        // 也可以在初始化体系时继续刷新二维码（可选）
        document.getElementById('start-overlay')?.addEventListener('click', generateQRCode);
    </script>
</body>
</html>
